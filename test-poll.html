<!DOCTYPE html>
<html>
<body>
<script>
window.onload = async () => {
    try {
        console.log("Testing Pollinations via CORS...");
        const response = await fetch('https://corsproxy.io/?https://text.pollinations.ai/', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                messages: [
                    { role: 'user', content: 'Hola' }
                ],
                jsonMode: false
            })
        });
        console.log("Status: ", response.status);
        console.log("Res: ", await response.text());
    } catch(e) {
        console.error("Error: ", e.message);
    }
}
</script>
</body>
</html>
